services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: buro_user
      POSTGRES_PASSWORD: buro_password
      POSTGRES_DB: buro_database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buro_user -d buro_database"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      target: runtime
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://buro_user:buro_password@postgres:5432/buro_database
    command:
      [
        "sh",
        "-c",
        "uv run alembic upgrade head && uv run uvicorn src.main:app --host 0.0.0.0 --port 8000",
      ]
    ports:
      - "8000:8000"
    volumes:
      - .:/src
      - api_venv:/src/.venv
    depends_on:
      postgres:
        condition: service_healthy

  test:
    build:
      context: .
      target: dev
    environment:
      TEST_DATABASE_URL: postgresql+psycopg://buro_user:buro_password@postgres:5432/buro_test_database
      JWT_SECRET_KEY: test-secret-key-with-32-plus-bytes
      APP_DEBUG: "false"
    command: ["uv", "run", "pytest", "-q"]
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - test

volumes:
  db_data:
  api_venv:
